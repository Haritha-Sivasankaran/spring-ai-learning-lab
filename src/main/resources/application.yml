spring:
  application:
    name: spring-ai-learning-lab
  ai:
    model:
      chat: none
    openai:
      api-key: mock-key-not-used
  datasource:
    url: jdbc:h2:mem:studybuddy;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000,http://localhost:5173,https://tigerless-labs.github.io}
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3b7a1e5f9c8d7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  quota:
    daily-limit: ${DAILY_QUOTA_LIMIT:10}

